name: Swift CI (standards layer)

# Layer wrapper for swift-institute/.github/.github/workflows/swift-ci.yml.
#
# Encodes the L2 layer's structural anchor in the org-hierarchy-mirroring
# CI architecture per [CI-004a]. Currently a thin pass-through to the
# universal reusable; layer-specific jobs (e.g., spec-version pin lint,
# authority-attribution lint) accumulate as L2 invariants are identified.
#
# Consume from a caller package's .github/workflows/ci.yml via:
#
#   jobs:
#     ci:
#       uses: swift-standards/.github/.github/workflows/swift-ci.yml@main
#       secrets: inherit
#
# Default `enable-private-repos: true` covers the canonical L2 case (most
# standards consumers depend on private intra-Institute siblings); pass
# `with: { enable-private-repos: false }` only for the rare public-only
# consumer that wants to suppress the configure-git step. `secrets:
# inherit` is uniform across LAYER-ORG consumers per
# [CI-031]/[CI-058]/[CI-059]; SUB-ORG consumers explicit-forward the
# named credential set instead per the [CI-059] sub-org caveat
# ([CI-109] — their hop into this wrapper is cross-org and inherit
# would deliver nothing).
#
# Sub-org repos in swift-ietf, swift-iso, swift-w3c, swift-whatwg,
# swift-ecma, swift-incits, swift-ieee, swift-iec, swift-arm-ltd,
# swift-intel, swift-riscv ALSO route through THIS wrapper per [CI-004b]
# (per-authority sub-org wrappers blocked by GitHub Actions workflow_call
# 4-level depth limit; sub-org repos route through their parent layer
# wrapper until the limit relaxes or the universal is refactored to
# inline its advisory linters as steps).
#
# Provenance: swift-institute/Research/ci-cd-cross-ecosystem-reuse.md
# v1.1.1 (2026-05-06, Tier 2 RECOMMENDATION).

on:
  workflow_call:
    inputs:
      swift-version:
        type: string
        default: "6.3"
        description: "Swift stable floor propagated to the universal matrix. The nightly job is always 6.4-dev."
      enable-private-repos:
        type: boolean
        default: true
        description: "If true, configure credentialed git url rewrites (App-token primary, PRIVATE_REPO_TOKEN fallback) for github.com clones. Default true: most L2 consumers depend on private intra-Institute deps."
      macos-runner:
        type: string
        default: "macos-26"
        description: "macOS runner image. Bump annually when GitHub adds a new image version. env.* is invalid in runs-on: per Actions context-availability rules — input is the working centralization mechanism."
      platform-support:
        type: string
        default: ""
        description: "Per-package CI platform-support declaration, passed through verbatim to the universal matrix. Empty default (every existing caller) = full matrix, bit-identical to before this input existed. Non-empty = comma-separated subset of `apple,linux,windows` (lowercase, no spaces). Declare ONLY platform-identity exclusions — a package whose specification or identity excludes a platform (POSIX/ISO-9945 spec packages, per-platform roots); NOT a cost knob and NOT derived from Package.swift `platforms:`. Full semantics: the universal reusable's `platform-support` input doc (swift-institute/.github/.github/workflows/swift-ci.yml)."
    secrets:
      PRIVATE_REPO_TOKEN:
        required: false
        description: |
          Legacy github.com-wide fallback credential for private-dep
          clones. Superseded by the App-token path; retained for orgs
          not yet provisioned with the App secrets.
      SWIFT_INSTITUTE_BOT_APP_CLIENT_ID:
        required: false
        description: |
          swift-institute-bot App Client ID (org-level secret; preferred
          name era). With the private key, lets configure-private-repos
          mint per-job contents:read installation tokens for the layer
          orgs so `swift package resolve` can clone private deps.
      SWIFT_INSTITUTE_BOT_APP_ID:
        required: false
        description: |
          Legacy-era App ID secret name carried by some orgs (numeric
          App ID value class). Accepted as fallback when _APP_CLIENT_ID
          is absent; client-id wins when both exist.
      SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY:
        required: false
        description: |
          swift-institute-bot App private key (org-level secret).

jobs:
  # Universal matrix delegated to the ecosystem-wide reusable. L2-specific
  # invariants (none today) would land as additional jobs alongside this.
  matrix:
    if: ${{ !github.event.repository.private }}
    uses: swift-institute/.github/.github/workflows/swift-ci.yml@main
    with:
      swift-version: ${{ inputs.swift-version }}
      enable-private-repos: ${{ inputs.enable-private-repos }}
      macos-runner: ${{ inputs.macos-runner }}
      platform-support: ${{ inputs.platform-support }}
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
      SWIFT_INSTITUTE_BOT_APP_CLIENT_ID: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_CLIENT_ID }}
      SWIFT_INSTITUTE_BOT_APP_ID: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_ID }}
      SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY: ${{ secrets.SWIFT_INSTITUTE_BOT_APP_PRIVATE_KEY }}

  # Conclusion aggregator — single required-status-check name for branch
  # protection on swift-standards consumer repos. Mirrors the universal
  # swift-ci.yml's ci-ok job; here, the only need is `matrix` (which itself
  # reflects the universal workflow's success aggregate).
  ci-ok:
    if: ${{ always() && !github.event.repository.private }}
    needs:
      - matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Aggregate required-job results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          # success or skipped → pass; failure or cancelled → fail.
          jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< "$NEEDS_JSON"
