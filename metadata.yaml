# swift-standards org-level metadata.
#
# swift-standards is the umbrella org for cross-cutting standards work and the
# notional parent of the standards-body sub-orgs (swift-ietf, swift-iso,
# swift-ieee, swift-iec, swift-w3c, swift-whatwg, swift-ecma, swift-incits).
# Each sub-org carries the same socialPreview brand for visual cohesion;
# authority differentiation is in the package name (e.g., swift-rfc-4122).
#
# Schema mirrors per-repo .github/metadata.yaml. Read by social-preview.sh.

description: "Specification implementations for Swift."
homepage: "https://swift-institute.org"

socialPreview:
  accent:
    from: "#A8AEB8"   # silver gradient top
    to: "#4D5664"     # silver gradient bottom
    text: "#4D5664"   # caption ink
  caption: "STANDARDS"
readme:
  family: G

# Org-account profile fields (display name, description, email, website, X, location).
# Applied via `gh api -X PATCH /orgs/<org>`; no org-level sync workflow exists yet.
org:
  name: "Swift Standards"
  description: "Swift implementations of international standards — Layer 2 of the Swift Institute ecosystem."
  email: "coen@coenttb.com"
  blog: "https://swift-institute.org"
  twitter: "coenttb"
  location: "Netherlands"
